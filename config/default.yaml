app:
  language: zh-CN
  max_input_chars: 500
  max_reply_chars: 500
llm:
  provider: mock
  model: deepseek-v4-flash
  base_url: https://opencode.ai/zen/go/v1
  api_key_env: OPENCODE_GO_API_KEY
  temperature: 0.5
  timeout_seconds: 30
  max_retries: 1
tts:
  provider: mock
  output_dir: assets/temp
  voice: zh-CN-XiaoxiaoNeural
  timeout_seconds: 30
avatar:
  provider: mock
  reset_after_speech: true
  default_expression: neutral
  prometheus_output_dir: data/prometheus_avatar
  prometheus_model_url: https://cdn.jsdelivr.net/gh/guansss/pixi-live2d-display@0.4.0/test/assets/shizuku/shizuku.model.json
planner:
  max_gestures: 2
  enable_cooldown: true
personalization:
  enabled: true
  profile_dir: data/profiles
  update_interval: 5
  big_five_learning_rate: 0.05
  gesture_affinity_decay: 0.95
