cooldowns_seconds:
  wave: 10
  small_bow: 10
  think: 5
  explain: 3
  nod: 2
emotion_defaults:
  confused:
    expression: confused
    gestures: [head_tilt]
  thoughtful:
    expression: thinking
    gestures: [think]
  happy:
    expression: smile
    gestures: [nod]
  apologetic:
    expression: concerned
    gestures: [small_bow]
  supportive:
    expression: concerned
    gestures: [nod]
keyword_gestures:
  farewell:
    keywords: ["再见", "拜拜", "回头见", "下次见"]
    gesture: wave
  explanation:
    keywords: ["解释", "说明", "概念", "为什么", "怎么"]
    gesture: explain
